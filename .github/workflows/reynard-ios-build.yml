name: ChatGPT Gecko Build

on:
  workflow_dispatch:
  push:
    paths:
      - "ReynardChatGPT/**"
      - ".github/workflows/reynard-ios-build.yml"
  pull_request:
    paths:
      - "ReynardChatGPT/**"
      - ".github/workflows/reynard-ios-build.yml"

jobs:
  build-chatgpt-gecko:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          xcodebuild -version
          python3 --version

      - name: Install packaging tools
        run: brew install ldid

      - name: Make Reynard scripts executable
        run: chmod +x ReynardChatGPT/tools/development/*.sh ReynardChatGPT/tools/release/*.sh

      - name: Cache prebuilt Gecko engine
        uses: actions/cache@v4
        with:
          path: ReynardChatGPT/engine/prebuilt-gecko
          key: reynard-prebuilt-gecko-0.3.0-Reynard-ipa-shim-v7

      - name: Prepare prebuilt Gecko engine
        working-directory: ReynardChatGPT
        run: ./tools/development/setup-prebuilt-gecko.sh

      - name: Build iOS archive
        working-directory: ReynardChatGPT
        run: ./tools/release/build-app.sh

      - name: Package IPA
        working-directory: ReynardChatGPT
        run: |
          ./tools/release/create-ipa.sh
          cp dist/Reynard.ipa ../ChatGPT-Gecko.ipa
          cp dist/Reynard-TrollStore.tipa ../ChatGPT-Gecko-TrollStore.tipa

      - name: Publish IPA to rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-gecko-latest
          name: CI ChatGPT Gecko IPA
          prerelease: true
          make_latest: false
          files: |
            ChatGPT-Gecko.ipa
            ChatGPT-Gecko-TrollStore.tipa
          overwrite_files: true
          body: |
            Latest experimental ChatGPT Gecko/Reynard build from `${{ github.sha }}`.

            This build is separate from the existing WKWebView fallback IPA.
