name: ChatGPT iOS 15 Build

on:
  workflow_dispatch:
  push:
    paths:
      - "ReynardChatGPT/**"
      - ".github/workflows/reynard-ios-build.yml"
  pull_request:
    paths:
      - "ReynardChatGPT/**"
      - ".github/workflows/reynard-ios-build.yml"

jobs:
  build-chatgpt-ios15:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          xcodebuild -version
          python3 --version

      - name: Install packaging tools
        run: brew install ldid

      - name: Make Reynard scripts executable
        run: chmod +x ReynardChatGPT/tools/development/*.sh ReynardChatGPT/tools/release/*.sh

      - name: Cache prebuilt Gecko engine
        uses: actions/cache@v4
        with:
          path: ReynardChatGPT/engine/prebuilt-gecko
          key: reynard-prebuilt-gecko-0.3.0-Reynard-ipa-shim-v14

      - name: Prepare prebuilt Gecko engine
        working-directory: ReynardChatGPT
        run: ./tools/development/setup-prebuilt-gecko.sh

      - name: Build iOS archive
        working-directory: ReynardChatGPT
        run: ./tools/release/build-app.sh

      - name: Package TrollStore TIPA
        working-directory: ReynardChatGPT
        run: |
          ./tools/release/create-ipa.sh
          cp dist/Reynard-TrollStore.tipa ../ChatGPT-TrollStore.tipa

      - name: Clear rolling prerelease assets
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view ci-gecko-latest >/dev/null 2>&1; then
            exit 0
          fi

          gh release view ci-gecko-latest --json assets --jq '.assets[].name' > /tmp/chatgpt-ios15-assets.txt
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset ci-gecko-latest "$asset" --yes
          done < /tmp/chatgpt-ios15-assets.txt

      - name: Publish TIPA to rolling prerelease
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-gecko-latest
          name: CI ChatGPT iOS 15 TIPA
          prerelease: true
          make_latest: false
          files: |
            ChatGPT-TrollStore.tipa
          overwrite_files: true
          body: |
            Latest ChatGPT iOS 15 build from `${{ github.sha }}`.
