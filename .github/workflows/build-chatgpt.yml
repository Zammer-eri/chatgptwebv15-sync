name: Build ChatGPT

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-chatgpt-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: chatgpt

jobs:
  build-chatgpt-source:
    name: Build ChatGPT shell from Reynard base
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Build ChatGPT shell package
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: chatgpt
