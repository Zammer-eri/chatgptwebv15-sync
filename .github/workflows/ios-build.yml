name: iOS Build

on:
  workflow_dispatch:
  push:
    paths:
      - "Downloads/ChatGPTWebV15/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "Downloads/ChatGPTWebV15/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app without signing
        run: |
          rm -rf build
          xcodebuild \
            -project Downloads/ChatGPTWebV15/ChatGPTWebV15.xcodeproj \
            -scheme ChatGPTWebV15 \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/ChatGPTWebV15.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            find build -name "*.app" -maxdepth 6
            exit 1
          fi

          mkdir -p ipa/Payload
          cp -R "$APP_PATH" ipa/Payload/
          cd ipa
          /usr/bin/zip -qry ../ChatGPT-unsigned.ipa Payload

      - name: Publish IPA to rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-unsigned-latest
          name: CI Unsigned IPA
          prerelease: true
          make_latest: false
          files: ChatGPT-unsigned.ipa
          overwrite_files: true
          body: |
            Latest unsigned TrollStore-oriented IPA built from `${{ github.sha }}`.
            
            This release is updated by GitHub Actions and is intended for quick testing.
