name: Build Shared Gecko Engine

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-engine-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: browser

jobs:
  build-engine-source:
    name: Build Reynard Gecko engine
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Prepare shell profile and runner
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: prepare-runner
          package_app: "false"
          publish_shell_release: "false"

      - name: Prepare Gecko source and cache
        id: prepare_gecko
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: prepare-gecko
          package_app: "false"
          publish_shell_release: "false"

      - name: Build Gecko engine
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: build-gecko
          package_app: "false"
          publish_shell_release: "false"
          gecko_cache_hit: ${{ steps.prepare_gecko.outputs.gecko_cache_hit }}

      - name: Publish shared Gecko engine artifact
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: publish-engine
          package_app: "false"
          publish_shell_release: "false"
