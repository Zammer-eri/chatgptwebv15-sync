name: Build Engine

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-engine-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: browser

jobs:
  build-engine-source:
    name: Build Reynard Gecko engine
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Build engine artifact
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          package_app: "false"
          publish_shell_release: "false"
