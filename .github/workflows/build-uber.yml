name: Build Uber

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-uber-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: uber

jobs:
  build-uber-source:
    name: Build Uber shell from Reynard base
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Build Uber shell package
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
