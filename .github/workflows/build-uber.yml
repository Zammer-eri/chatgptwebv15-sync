name: Build Uber

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-uber-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: uber

jobs:
  build-uber-source:
    name: Build Uber shell from Reynard base
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Prepare shell profile and runner
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: prepare-runner

      - name: Prepare Gecko source and cache
        id: prepare_gecko
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: prepare-gecko

      - name: Prepare JIT native bridge
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: prepare-app

      - name: Build Gecko engine
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: build-gecko
          gecko_cache_hit: ${{ steps.prepare_gecko.outputs.gecko_cache_hit }}

      - name: Publish shared Gecko engine artifact
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: publish-engine

      - name: Archive Uber app
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: archive-app

      - name: Package Uber TIPA
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: package-app

      - name: Verify Uber package
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: verify-package

      - name: Upload Uber artifacts
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: upload-artifacts

      - name: Publish Uber rolling prerelease
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: uber
          stage: publish-shell-release
