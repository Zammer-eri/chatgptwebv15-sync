name: Build Browser

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

concurrency:
  group: build-browser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-old-03:
    name: Build old 0.3 mixed baseline
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      RELEASE_TAG: diagnostic-0.3-mixed

    steps:
      - name: Checkout old shell-era source
        uses: actions/checkout@v4
        with:
          ref: f409d0c
          fetch-depth: 1
          submodules: false
          path: old-source

      - name: Show build host
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          python3 --version
          df -h

      - name: Install packaging tools
        run: brew list ldid >/dev/null 2>&1 || brew install ldid

      - name: Make Reynard scripts executable
        run: chmod +x old-source/ReynardChatGPT/tools/development/*.sh old-source/ReynardChatGPT/tools/release/*.sh

      - name: Cache old prebuilt Gecko engine
        uses: actions/cache@v4
        with:
          path: old-source/ReynardChatGPT/engine/prebuilt-gecko
          key: reynard-prebuilt-gecko-0.3.0-shim-v3-${{ hashFiles('old-source/ReynardChatGPT/tools/development/setup-prebuilt-gecko.sh') }}
          restore-keys: |
            reynard-prebuilt-gecko-0.3.0-shim-v3-

      - name: Prepare old prebuilt Gecko engine
        working-directory: old-source/ReynardChatGPT
        run: ./tools/development/setup-prebuilt-gecko.sh

      - name: Archive old browser app
        working-directory: old-source/ReynardChatGPT
        run: ./tools/release/build-app.sh

      - name: Package old TrollStore TIPA
        working-directory: old-source/ReynardChatGPT
        run: ./tools/release/create-ipa.sh

      - name: Prepare release asset
        run: |
          set -euo pipefail
          cp old-source/ReynardChatGPT/dist/Reynard-TrollStore.tipa Reynard-0.3-mixed.tipa
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          path = Path("Reynard-0.3-mixed.tipa")
          print(f"{path}: {path.stat().st_size} bytes")
          print(hashlib.sha256(path.read_bytes()).hexdigest())
          PY

      - name: Publish diagnostic prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          test -f Reynard-0.3-mixed.tipa

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

          {
            echo "Diagnostic old mixed-build baseline for commit $GITHUB_SHA."
            echo
            echo "This builds commit f409d0c using the old Reynard 0.3 mixed method."
            echo "Purpose: verify whether the old GitHub Actions mixed build still launches on the device."
          } > "$NOTES_FILE"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Diagnostic Reynard 0.3 Mixed Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" \
              --title "Diagnostic Reynard 0.3 Mixed Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$RELEASE_TAG" Reynard-0.3-mixed.tipa --clobber
