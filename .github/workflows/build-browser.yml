name: Build Browser

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

concurrency:
  group: build-browser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Publish Reynard 0.4.0 Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ROLLING_TAG: rolling

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Download known-good upstream baseline
        run: sh ./tools/release/download-upstream-baseline.sh

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ASSET_PATH="dist/Reynard-TrollStore.tipa"
          NOTES_FILE="$(mktemp)"

          test -f "$ASSET_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$ROLLING_TAG" --force

          {
            echo "Rolling baseline build for commit $GITHUB_SHA."
            echo
            echo "This artifact is upstream Reynard 0.4.0 TrollStore TIPA, verified by SHA-256."
            echo "No local source build, shell patches, signing, or Gecko repackaging is applied."
          } > "$NOTES_FILE"

          if gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release edit "$ROLLING_TAG" \
              --title "Rolling Reynard Baseline" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          else
            gh release create "$ROLLING_TAG" \
              --title "Rolling Reynard Baseline" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$ROLLING_TAG" "$ASSET_PATH#Reynard-TrollStore.tipa" --clobber
