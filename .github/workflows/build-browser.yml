name: Build Browser

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-browser-${{ github.ref }}
  cancel-in-progress: true

env:
  ROLLING_TAG: rolling
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"

jobs:
  build-reynard-source:
    name: Build Reynard 0.4 from source
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          for xcode in /Applications/Xcode_26.5.app /Applications/Xcode_26.5.0.app /Applications/Xcode.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode"
              break
            fi
          done
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          python3 --version
          rustc --version
          cargo --version
          df -h

      - name: Install packaging tools
        run: |
          set -euo pipefail
          brew list ldid >/dev/null 2>&1 || brew install ldid
          rustup target add aarch64-apple-ios

      - name: Make scripts executable
        run: find tools browser/Scripts -name "*.sh" -exec chmod +x {} +

      - name: Sync Firefox source
        run: ./tools/development/update-gecko.sh

      - name: Apply Reynard Gecko patches
        run: ./tools/development/apply-patches.sh

      - name: Sync idevice source
        run: git submodule update --init --recursive support/idevice

      - name: Cache Gecko object directory
        uses: actions/cache@v4
        with:
          path: |
            engine/firefox/obj-aarch64-apple-ios
            ~/.mozbuild
          key: reynard-gecko-source-0.4-${{ runner.os }}-${{ hashFiles('engine/release.txt', 'patches/**/*.patch', 'tools/development/build-gecko.sh') }}
          restore-keys: |
            reynard-gecko-source-0.4-${{ runner.os }}-

      - name: Cache JIT native bridge
        uses: actions/cache@v4
        with:
          path: |
            support/idevice/target
            browser/Reynard/JIT/libidevice_ffi.a
            ~/.cargo/git
            ~/.cargo/registry
          key: reynard-idevice-ffi-source-${{ runner.os }}-${{ hashFiles('tools/development/build-idevice.sh', '.gitmodules') }}
          restore-keys: |
            reynard-idevice-ffi-source-${{ runner.os }}-

      - name: Build idevice FFI
        run: ./tools/development/build-idevice.sh

      - name: Build Gecko from source
        run: ./tools/development/build-gecko.sh

      - name: Archive browser app
        env:
          REYNARD_SKIP_CODE_SIGNING: "1"
        run: ./tools/release/build-app.sh

      - name: Package TrollStore TIPA
        env:
          REYNARD_TROLLSTORE_ONLY: "1"
        run: ./tools/release/create-ipa.sh

      - name: Verify package
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import plistlib
          import zipfile
          from pathlib import Path

          tipa = Path("dist/Reynard-TrollStore.tipa")
          if not tipa.exists():
              raise SystemExit("missing dist/Reynard-TrollStore.tipa")

          with zipfile.ZipFile(tipa) as archive:
              names = set(archive.namelist())
              required = [
                  "Payload/Reynard.app/Reynard",
                  "Payload/Reynard.app/PlugIns/Reynard Helper.appex/Reynard Helper",
                  "Payload/Reynard.app/PlugIns/OpenIn.appex/OpenIn",
                  "Payload/Reynard.app/Frameworks/GeckoView.framework/GeckoView",
                  "Payload/Reynard.app/Frameworks/GeckoView.framework/XUL",
                  "Payload/Reynard.app/ptrace_jit",
              ]
              missing = [name for name in required if name not in names]
              if missing:
                  raise SystemExit(f"missing package members: {missing}")
              info = plistlib.loads(archive.read("Payload/Reynard.app/Info.plist"))

          sha256 = hashlib.sha256(tipa.read_bytes()).hexdigest()
          report = "\n".join([
              "# Reynard Source Build",
              "",
              f"- sha256: `{sha256}`",
              f"- bytes: {tipa.stat().st_size}",
              f"- version: {info.get('CFBundleShortVersionString')}",
              f"- build: {info.get('CFBundleVersion')}",
              f"- minimum iOS: {info.get('MinimumOSVersion')}",
              f"- Xcode: {info.get('DTXcode')} {info.get('DTXcodeBuild')}",
              "",
              "Built from repository source using upstream Reynard Gecko patches.",
              "No upstream IPA payload extraction or runtime splicing is used.",
              "",
          ])
          Path("dist/reynard-source-build.md").write_text(report, encoding="utf-8")
          print(report)
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-Source-Build
          path: |
            dist/Reynard-TrollStore.tipa
            dist/reynard-source-build.md
          if-no-files-found: error

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          test -f dist/Reynard-TrollStore.tipa
          test -f dist/reynard-source-build.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$ROLLING_TAG" --force

          {
            echo "Rolling Reynard source build for commit $GITHUB_SHA."
            echo
            echo "Asset:"
            echo "- Reynard-TrollStore.tipa: source-built Reynard package."
            echo
            echo "No upstream IPA payload extraction or runtime splicing is used."
          } > "$NOTES_FILE"

          if gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release edit "$ROLLING_TAG" \
              --title "Rolling Reynard Source Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          else
            gh release create "$ROLLING_TAG" \
              --title "Rolling Reynard Source Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release view "$ROLLING_TAG" --json assets --jq '.assets[].name' > /tmp/reynard-release-assets.txt
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset "$ROLLING_TAG" "$asset" --yes
          done < /tmp/reynard-release-assets.txt

          gh release upload "$ROLLING_TAG" \
            dist/Reynard-TrollStore.tipa \
            dist/reynard-source-build.md \
            --clobber
