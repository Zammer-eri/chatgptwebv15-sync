name: Build Shell

on:
  workflow_dispatch:
    inputs:
      shell_target:
        description: "Shell target: browser, chatgpt, or uber"
        required: false
        default: chatgpt
        type: string
      shell_display_name:
        description: "Installed app display name"
        required: false
        default: ChatGPT
        type: string
      shell_bundle_identifier:
        description: "Main app bundle identifier"
        required: false
        default: com.chatgpt.shell
        type: string
      shell_url_scheme:
        description: "Custom URL scheme"
        required: false
        default: chatgptshell
        type: string
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-shell-${{ github.ref }}
  cancel-in-progress: true

env:
  ROLLING_TAG: rolling
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: ${{ github.event.inputs.shell_target || 'chatgpt' }}
  SHELL_DISPLAY_NAME: ${{ github.event.inputs.shell_display_name || 'ChatGPT' }}
  SHELL_BUNDLE_IDENTIFIER: ${{ github.event.inputs.shell_bundle_identifier || 'com.chatgpt.shell' }}
  SHELL_URL_SCHEME: ${{ github.event.inputs.shell_url_scheme || 'chatgptshell' }}

jobs:
  build-shell-source:
    name: Build shell from Reynard 0.4 source
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          for xcode in /Applications/Xcode_26.5.app /Applications/Xcode_26.5.0.app /Applications/Xcode.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode"
              break
            fi
          done
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          python3 --version
          rustc --version
          cargo --version
          df -h

      - name: Restore Rust tooling cache
        id: restore-rust-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/cbindgen
            ~/.cargo/git
            ~/.cargo/registry
          key: reynard-rust-tools-${{ runner.os }}-cbindgen-v1
          restore-keys: |
            reynard-rust-tools-${{ runner.os }}-

      - name: Install packaging tools
        run: |
          set +e
          mkdir -p dist
          {
            set -euo pipefail
            brew list ldid >/dev/null 2>&1 || brew install ldid
            brew list lld >/dev/null 2>&1 || brew install lld
            LLD_PREFIX="$(brew --prefix lld)"
            test -x "$LLD_PREFIX/bin/ld64.lld"
            echo "$LLD_PREFIX/bin" >> "$GITHUB_PATH"
            echo "REYNARD_LINKER=lld" >> "$GITHUB_ENV"
            rustup target add aarch64-apple-ios
            command -v cbindgen >/dev/null 2>&1 || cargo install cbindgen --locked
          } 2>&1 | tee dist/install-tools.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error title=Install packaging tools failed::$(tail -80 dist/install-tools.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
            exit "$status"
          fi

      - name: Save Rust tooling cache
        if: steps.restore-rust-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/cbindgen
            ~/.cargo/git
            ~/.cargo/registry
          key: reynard-rust-tools-${{ runner.os }}-cbindgen-v1

      - name: Upload tool install log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-tools-log
          path: dist/install-tools.log
          if-no-files-found: ignore

      - name: Make scripts executable
        run: find tools browser/Scripts -name "*.sh" -exec chmod +x {} +

      - name: Sync Firefox source
        run: ./tools/development/update-gecko.sh

      - name: Apply Reynard Gecko patches
        run: ./tools/development/apply-patches.sh

      - name: Sync idevice source
        run: git submodule update --init --recursive support/idevice

      - name: Restore Gecko object cache
        id: restore-gecko-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            engine/firefox/obj-aarch64-apple-ios
            ~/.mozbuild
          key: reynard-gecko-source-0.4-${{ runner.os }}-${{ hashFiles('engine/release.txt', 'patches/**/*.patch', 'tools/development/build-gecko.sh') }}
          restore-keys: |
            reynard-gecko-source-0.4-${{ runner.os }}-

      - name: Restore JIT native bridge cache
        id: restore-idevice-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            support/idevice/target
            browser/Reynard/JIT/libidevice_ffi.a
          key: reynard-idevice-ffi-source-${{ runner.os }}-${{ hashFiles('tools/development/build-idevice.sh', '.gitmodules') }}
          restore-keys: |
            reynard-idevice-ffi-source-${{ runner.os }}-

      - name: Build idevice FFI
        env:
          IDEVICE_CACHE_HIT: ${{ steps.restore-idevice-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          if [ "$IDEVICE_CACHE_HIT" = "true" ] && [ -f browser/Reynard/JIT/libidevice_ffi.a ]; then
            echo "Exact idevice cache hit; libidevice_ffi.a exists. Skipping cargo build."
            exit 0
          fi
          ./tools/development/build-idevice.sh

      - name: Save JIT native bridge cache
        if: steps.restore-idevice-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            support/idevice/target
            browser/Reynard/JIT/libidevice_ffi.a
          key: reynard-idevice-ffi-source-${{ runner.os }}-${{ hashFiles('tools/development/build-idevice.sh', '.gitmodules') }}

      - name: Build Gecko from source
        env:
          GECKO_CACHE_HIT: ${{ steps.restore-gecko-cache.outputs.cache-hit }}
        run: |
          set +e
          mkdir -p dist
          if [ "$GECKO_CACHE_HIT" = "true" ] && \
             [ -f engine/firefox/obj-aarch64-apple-ios/dist/bin/XUL ] && \
             [ -f engine/firefox/obj-aarch64-apple-ios/dist/include/mozilla-config.h ]; then
            echo "Exact Gecko cache hit; required source-built outputs exist. Skipping mach build." | tee dist/build-gecko.log
            exit 0
          fi
          ./tools/development/build-gecko.sh 2>&1 | tee dist/build-gecko.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## Build Gecko failure"
              echo
              echo '```text'
              tail -200 dist/build-gecko.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Build Gecko failed::$(tail -20 dist/build-gecko.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
            exit "$status"
          fi

      - name: Save Gecko object cache
        if: steps.restore-gecko-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            engine/firefox/obj-aarch64-apple-ios
            ~/.mozbuild
          key: reynard-gecko-source-0.4-${{ runner.os }}-${{ hashFiles('engine/release.txt', 'patches/**/*.patch', 'tools/development/build-gecko.sh') }}

      - name: Upload Gecko build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gecko-build-log
          path: dist/build-gecko.log
          if-no-files-found: ignore

      - name: Archive shell app
        env:
          REYNARD_SKIP_CODE_SIGNING: "1"
        run: ./tools/release/build-app.sh

      - name: Package TrollStore TIPA
        env:
          REYNARD_TROLLSTORE_ONLY: "1"
        run: ./tools/release/create-ipa.sh

      - name: Verify package
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import os
          import plistlib
          import zipfile
          from pathlib import Path

          tipa = Path("dist/Reynard-TrollStore.tipa")
          if not tipa.exists():
              raise SystemExit("missing dist/Reynard-TrollStore.tipa")

          with zipfile.ZipFile(tipa) as archive:
              names = set(archive.namelist())
              required = [
                  "Payload/Reynard.app/Reynard",
                  "Payload/Reynard.app/PlugIns/Reynard Helper.appex/Reynard Helper",
                  "Payload/Reynard.app/Frameworks/GeckoView.framework/GeckoView",
                  "Payload/Reynard.app/Frameworks/GeckoView.framework/XUL",
                  "Payload/Reynard.app/ptrace_jit",
              ]
              if os.environ.get("SHELL_TARGET", "chatgpt") == "browser" or os.environ.get("SHELL_PACKAGE_OPENIN_EXTENSION") == "1":
                  required.append("Payload/Reynard.app/PlugIns/OpenIn.appex/OpenIn")
              missing = [name for name in required if name not in names]
              if missing:
                  raise SystemExit(f"missing package members: {missing}")
              info = plistlib.loads(archive.read("Payload/Reynard.app/Info.plist"))

          sha256 = hashlib.sha256(tipa.read_bytes()).hexdigest()
          report = "\n".join([
              "# Shell Source Build",
              "",
              f"- target: `{os.environ.get('SHELL_TARGET', 'chatgpt')}`",
              f"- display name: `{os.environ.get('SHELL_DISPLAY_NAME', 'ChatGPT')}`",
              f"- bundle id: `{info.get('CFBundleIdentifier')}`",
              f"- sha256: `{sha256}`",
              f"- bytes: {tipa.stat().st_size}",
              f"- version: {info.get('CFBundleShortVersionString')}",
              f"- build: {info.get('CFBundleVersion')}",
              f"- minimum iOS: {info.get('MinimumOSVersion')}",
              f"- Xcode: {info.get('DTXcode')} {info.get('DTXcodeBuild')}",
              "",
              "Built from repository source using upstream Reynard Gecko patches.",
              "No upstream IPA payload extraction or runtime splicing is used.",
              "",
          ])
          Path("dist/shell-source-build.md").write_text(report, encoding="utf-8")
          print(report)
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Shell-Source-Build
          path: |
            dist/Reynard-TrollStore.tipa
            dist/shell-source-build.md
          if-no-files-found: error

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          test -f dist/Reynard-TrollStore.tipa
          test -f dist/shell-source-build.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$ROLLING_TAG" --force

          {
            echo "Rolling shell source build for commit $GITHUB_SHA."
            echo
            echo "Shell target: $SHELL_TARGET"
            echo "Display name: $SHELL_DISPLAY_NAME"
            echo "Bundle id: $SHELL_BUNDLE_IDENTIFIER"
            echo
            echo "Asset:"
            echo "- Reynard-TrollStore.tipa: source-built shell package."
            echo
            echo "No upstream IPA payload extraction or runtime splicing is used."
          } > "$NOTES_FILE"

          if gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release edit "$ROLLING_TAG" \
              --title "Rolling Shell Source Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          else
            gh release create "$ROLLING_TAG" \
              --title "Rolling Shell Source Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release view "$ROLLING_TAG" --json assets --jq '.assets[].name' > /tmp/reynard-release-assets.txt
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset "$ROLLING_TAG" "$asset" --yes
          done < /tmp/reynard-release-assets.txt

          gh release upload "$ROLLING_TAG" \
            dist/Reynard-TrollStore.tipa \
            dist/shell-source-build.md \
            --clobber
