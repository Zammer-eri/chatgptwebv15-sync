name: Build Browser

on:
  workflow_dispatch:
    inputs:
      runner:
        description: GitHub runner label to use
        required: true
        default: macos-latest
        type: string
  push:

permissions:
  contents: write

concurrency:
  group: build-browser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Reynard TrollStore
    runs-on: ${{ github.event.inputs.runner || 'macos-latest' }}
    timeout-minutes: 90

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      ROLLING_TAG: rolling
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Show build host
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          python3 --version
          rustc --version
          cargo --version
          df -h

      - name: Install packaging tools
        run: |
          brew list ldid >/dev/null 2>&1 || brew install ldid
          rustup target add aarch64-apple-ios

      - name: Make scripts executable
        run: find tools browser/Scripts -name "*.sh" -exec chmod +x {} +

      - name: Cache prebuilt Gecko engine
        uses: actions/cache@v4
        with:
          path: engine/prebuilt-gecko
          key: reynard-prebuilt-gecko-0.4.0-clean-${{ hashFiles('tools/development/setup-prebuilt-gecko.sh') }}
          restore-keys: |
            reynard-prebuilt-gecko-0.4.0-clean-

      - name: Cache JIT native bridge
        uses: actions/cache@v4
        with:
          path: |
            support/idevice
            browser/Reynard/JIT/libidevice_ffi.a
            ~/.cargo/git
            ~/.cargo/registry
          key: reynard-idevice-ffi-ios13-${{ hashFiles('tools/development/build-idevice.sh') }}
          restore-keys: |
            reynard-idevice-ffi-ios13-

      - name: Prepare prebuilt Gecko engine
        run: ./tools/development/setup-prebuilt-gecko.sh

      - name: Build idevice FFI
        run: ./tools/development/build-idevice.sh

      - name: Archive browser app
        env:
          REYNARD_SKIP_CODE_SIGNING: "1"
        run: ./tools/release/build-app.sh

      - name: Package TrollStore TIPA
        env:
          REYNARD_TROLLSTORE_ONLY: "1"
        run: ./tools/release/create-ipa.sh

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ASSET_PATH="dist/Reynard-TrollStore.tipa"
          NOTES_FILE="$(mktemp)"

          test -f "$ASSET_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$ROLLING_TAG" --force

          {
            echo "Rolling TrollStore build for commit $GITHUB_SHA."
            echo
            echo "This prerelease is overwritten by each successful build."
          } > "$NOTES_FILE"

          if gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release edit "$ROLLING_TAG" \
              --title "Rolling TrollStore Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          else
            gh release create "$ROLLING_TAG" \
              --title "Rolling TrollStore Build" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$ROLLING_TAG" "$ASSET_PATH#Reynard-TrollStore.tipa" --clobber
