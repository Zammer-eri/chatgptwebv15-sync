name: Build Browser

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-browser-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  RUST_BACKTRACE: "1"
  SHELL_TARGET: browser

jobs:
  build-browser-source:
    name: Build browser baseline from Reynard base
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Prepare shell profile and runner
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: prepare-runner

      - name: Prepare Gecko source and cache
        id: prepare_gecko
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: prepare-gecko

      - name: Prepare JIT native bridge
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: prepare-app

      - name: Build Gecko engine
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: build-gecko
          gecko_cache_hit: ${{ steps.prepare_gecko.outputs.gecko_cache_hit }}

      - name: Publish shared Gecko engine artifact
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: publish-engine

      - name: Archive browser app
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: archive-app

      - name: Package browser TIPA
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: package-app

      - name: Verify browser package
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: verify-package

      - name: Upload browser artifacts
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: upload-artifacts

      - name: Publish browser rolling prerelease
        uses: ./.github/actions/build-shell-source
        with:
          shell_target: browser
          stage: publish-shell-release
