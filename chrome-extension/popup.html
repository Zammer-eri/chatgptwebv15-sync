<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPTWebV15 Session Bridge</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 320px;
      color: #111;
      background: #f4f4f1;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    label, input, button {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }
    input {
      margin: 6px 0 10px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      margin-top: 8px;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      min-height: 58px;
      border-radius: 10px;
      background: white;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>ChatGPTWebV15 Session Bridge</h1>
  <label for="helperBase">Helper URL</label>
  <input id="helperBase" type="text" value="http://127.0.0.1:48713">
  <button id="save">Save helper URL</button>
  <button id="sync">Sync now</button>
  <button id="refresh">Refresh ChatGPT in Chrome</button>
  <button id="health">Check helper</button>
  <div id="status">Ready.</div>
  <script src="popup.js"></script>
</body>
</html>
